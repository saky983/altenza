<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú del Restaurante</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6b0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Menú">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --vino:       #6b0f1a;
  --vino-dark:  #3d0409;
  --vino-mid:   #8b1a2a;
  --gold:       #c9a84c;
  --gold-light: #e8c97a;
  --gold-pale:  #f5e6b8;
  --cream:      #fdf6e3;
  --text-dark:  #1a0a00;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cormorant Garamond', serif;
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: linear-gradient(160deg, var(--vino-dark) 0%, var(--vino) 60%, var(--vino-mid) 100%);
  padding: 32px 20px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 20px,
    rgba(201,168,76,0.04) 20px,
    rgba(201,168,76,0.04) 21px
  );
}
.header-ornament {
  color: var(--gold);
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  opacity: 0.8;
  margin-bottom: 6px;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  color: var(--gold-light);
  font-weight: 700;
  letter-spacing: 2px;
  position: relative;
}
.gold-line {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 12px auto;
}
header p {
  color: rgba(245,230,184,0.7);
  font-size: 0.95rem;
  letter-spacing: 1px;
  font-style: italic;
}

/* ── CATEGORÍAS ── */
.cats {
  display: flex;
  gap: 8px;
  padding: 16px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--vino-dark);
}
.cats::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0;
  padding: 8px 20px;
  border-radius: 30px;
  border: 1.5px solid rgba(201,168,76,0.4);
  background: transparent;
  color: var(--gold-pale);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.95rem;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all .25s;
}
.cat-btn.active, .cat-btn:hover {
  background: var(--gold);
  color: var(--vino-dark);
  border-color: var(--gold);
  font-weight: 600;
}

/* ── BUSCADOR ── */
.search-wrap {
  padding: 14px 16px;
  background: var(--vino-dark);
}
.search-wrap input {
  width: 100%;
  padding: 10px 16px;
  border-radius: 30px;
  border: 1.5px solid rgba(201,168,76,0.3);
  background: rgba(255,255,255,0.07);
  color: var(--gold-pale);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  outline: none;
}
.search-wrap input::placeholder { color: rgba(245,230,184,0.4); }

/* ── GRID DE PRODUCTOS ── */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  color: var(--vino);
  padding: 20px 16px 4px;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--gold), transparent);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  padding: 10px 16px 20px;
}

.card {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(107,15,26,0.10);
  cursor: pointer;
  transition: transform .22s, box-shadow .22s;
  animation: fadeUp .4s ease both;
  border: 1px solid rgba(201,168,76,0.15);
}
.card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(107,15,26,0.18); }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(18px); }
  to   { opacity:1; transform: translateY(0); }
}
.card-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  background: linear-gradient(135deg, #f5e6b8, #e8c97a);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
}
.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.card-body { padding: 10px 12px 12px; }
.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  color: var(--vino-dark);
  font-weight: 700;
  margin-bottom: 4px;
  line-height: 1.3;
}
.card-desc {
  font-size: 0.78rem;
  color: #666;
  line-height: 1.4;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.price {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--vino);
  font-weight: 700;
}
.add-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--vino);
  color: var(--gold-light);
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.add-btn:hover { background: var(--gold); color: var(--vino-dark); }

.empty-msg {
  text-align: center;
  padding: 40px 20px;
  color: #aaa;
  font-style: italic;
  grid-column: 1/-1;
}

/* ── CARRITO FLOTANTE ── */
.cart-fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  background: linear-gradient(135deg, var(--vino), var(--vino-mid));
  color: var(--gold-light);
  border: 2px solid var(--gold);
  border-radius: 50px;
  padding: 12px 20px;
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(107,15,26,0.4);
  display: none;
  align-items: center;
  gap: 8px;
  transition: transform .2s;
  z-index: 100;
}
.cart-fab:hover { transform: scale(1.05); }
.cart-fab.visible { display: flex; }
.cart-badge {
  background: var(--gold);
  color: var(--vino-dark);
  border-radius: 50%;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem;
  font-weight: 700;
}

/* ── MODAL CARRITO ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(20,0,5,0.7);
  z-index: 200;
  backdrop-filter: blur(3px);
}
.overlay.open { display: flex; align-items: flex-end; }
.cart-sheet {
  background: var(--cream);
  width: 100%;
  max-height: 80vh;
  border-radius: 20px 20px 0 0;
  padding: 24px 20px;
  overflow-y: auto;
  animation: slideUp .3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.cart-header h2 {
  font-family: 'Playfair Display', serif;
  color: var(--vino);
  font-size: 1.4rem;
}
.close-btn {
  background: none;
  border: none;
  font-size: 1.5rem;
  color: var(--vino);
  cursor: pointer;
}
.cart-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(201,168,76,0.2);
}
.ci-img {
  width: 52px; height: 52px;
  border-radius: 8px;
  object-fit: cover;
  background: var(--gold-pale);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  flex-shrink: 0;
  overflow: hidden;
}
.ci-img img { width:100%; height:100%; object-fit:cover; }
.ci-info { flex:1; }
.ci-name { font-family:'Playfair Display',serif; font-size:.95rem; color:var(--vino-dark); }
.ci-price { font-size:.85rem; color:var(--gold); font-weight:600; }
.ci-qty {
  display: flex; align-items: center; gap: 8px;
}
.qty-btn {
  width:26px; height:26px; border-radius:50%;
  border: 1.5px solid var(--vino);
  background: none; color: var(--vino);
  font-size:1rem; cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.qty-num { font-weight:700; font-size:.95rem; min-width:16px; text-align:center; }

.cart-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0 8px;
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  color: var(--vino-dark);
}
.cart-total span:last-child { color: var(--vino); font-size: 1.4rem; }

.wa-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #25d366, #128c7e);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  cursor: pointer;
  margin-top: 8px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity .2s;
}
.wa-btn:hover { opacity: .9; }
.cart-empty {
  text-align:center; padding:30px; color:#aaa; font-style:italic;
}

/* ── MODAL DETALLE ── */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(20,0,5,0.75);
  z-index: 300;
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.detail-overlay.open { display: flex; }
.detail-card {
  background: var(--cream);
  border-radius: 18px;
  overflow: hidden;
  max-width: 380px;
  width: 100%;
  animation: zoomIn .25s ease;
}
@keyframes zoomIn {
  from { opacity:0; transform:scale(.92); }
  to   { opacity:1; transform:scale(1); }
}
.detail-img {
  width:100%; aspect-ratio:16/9; object-fit:cover;
  background: var(--gold-pale);
  display:flex; align-items:center; justify-content:center;
  font-size:4rem;
  overflow:hidden;
}
.detail-img img { width:100%; height:100%; object-fit:cover; }
.detail-body { padding:20px; }
.detail-cat {
  font-size:.75rem; letter-spacing:2px; text-transform:uppercase;
  color:var(--gold); margin-bottom:6px;
}
.detail-name {
  font-family:'Playfair Display',serif; font-size:1.5rem;
  color:var(--vino-dark); margin-bottom:8px;
}
.detail-desc { font-size:.95rem; color:#555; line-height:1.6; margin-bottom:14px; }
.detail-price {
  font-family:'Playfair Display',serif; font-size:1.6rem;
  color:var(--vino); margin-bottom:16px;
}
.detail-actions { display:flex; gap:10px; }
.detail-add {
  flex:1; padding:12px;
  background: var(--vino);
  color: var(--gold-light);
  border: none; border-radius:10px;
  font-family:'Playfair Display',serif; font-size:1rem;
  cursor:pointer; transition:background .2s;
}
.detail-add:hover { background: var(--vino-mid); }
.detail-close {
  padding:12px 16px;
  background:none; border:1.5px solid var(--vino);
  color:var(--vino); border-radius:10px;
  cursor:pointer; font-size:1rem;
}

/* ── LOADING ── */
.loading {
  text-align:center; padding:60px 20px;
  color:var(--vino); font-style:italic; font-size:1.1rem;
}
.spinner {
  width:40px; height:40px;
  border:3px solid var(--gold-pale);
  border-top-color:var(--vino);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto 16px;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="header-ornament">✦ Bienvenidos ✦</div>
  <h1 id="resto-name">Cargando...</h1>
  <div class="gold-line"></div>
  <p id="resto-tagline">Nuestra carta</p>
</header>

<div style="background:var(--vino-dark)">
  <div class="cats" id="cats">
    <button class="cat-btn active" data-cat="todos">Todos</button>
  </div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="🔍  Buscar platillo...">
  </div>
</div>

<div id="menu-container"></div>

<!-- FAB carrito -->
<button class="cart-fab" id="cart-fab" onclick="openCart()">
  🛒 <span id="fab-label">Mi Orden</span>
  <span class="cart-badge" id="cart-count">0</span>
</button>

<!-- Modal carrito -->
<div class="overlay" id="cart-overlay" onclick="closeCartOutside(event)">
  <div class="cart-sheet">
    <div class="cart-header">
      <h2>🛒 Mi Orden</h2>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div id="cart-items"></div>
    <div id="cart-total-wrap"></div>
  </div>
</div>

<!-- Modal detalle -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetailOutside(event)">
  <div class="detail-card" id="detail-card"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────
// CAMBIA ESTOS VALORES con los de tu repositorio GitHub:
const GITHUB_USER = 'saky983';
const GITHUB_REPO = 'altenza';
const DATA_FILE   = 'productos.json';
let WA_NUMBER = '50200000000'; // se sobreescribe desde productos.json

// ── Estado ────────────────────────────────────────────────
let productos = [];
let carrito   = [];
let catActiva = 'todos';
let filtro    = '';

// ── Carga de datos desde GitHub ──────────────────────────
async function cargarProductos() {
  const container = document.getElementById('menu-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando menú...</div>';

  const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${DATA_FILE}`;

  try {
    const res = await fetch(url + '?t=' + Date.now());
    if (!res.ok) throw new Error('No se pudo cargar');
    const data = await res.json();

    productos = data.productos || [];

    // Nombre del restaurante
    if (data.nombre) {
      document.getElementById('resto-name').textContent = data.nombre;
      document.title = data.nombre;
    }
    if (data.waNumber) { WA_NUMBER = data.waNumber; }
    if (data.tagline) {
      document.getElementById('resto-tagline').textContent = data.tagline;
    }

    construirCategorias();
    renderMenu();

  } catch (e) {
    container.innerHTML = `
      <div class="loading">
        <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
        No se pudo cargar el menú.<br>
        <small style="color:#aaa">Verifica tu conexión o configura el repositorio.</small>
      </div>`;
  }
}

// ── Categorías ────────────────────────────────────────────
function construirCategorias() {
  const cats = ['todos', ...new Set(productos.map(p => p.categoria))];
  const wrap = document.getElementById('cats');
  wrap.innerHTML = cats.map(c =>
    `<button class="cat-btn ${c === catActiva ? 'active' : ''}"
      data-cat="${c}" onclick="setCat('${c}')">
      ${c === 'todos' ? 'Todos' : c}
    </button>`
  ).join('');
}

function setCat(cat) {
  catActiva = cat;
  document.querySelectorAll('.cat-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.cat === cat));
  renderMenu();
}

// ── Render menú ───────────────────────────────────────────
function renderMenu() {
  const container = document.getElementById('menu-container');
  const f = filtro.toLowerCase();

  const activos = productos.filter(p =>
    (catActiva === 'todos' || p.categoria === catActiva) &&
    (p.nombre.toLowerCase().includes(f) || (p.descripcion||'').toLowerCase().includes(f))
  );

  if (!activos.length) {
    container.innerHTML = '<div class="grid"><div class="empty-msg">No se encontraron platillos.</div></div>';
    return;
  }

  // Agrupar por categoría
  const grupos = {};
  activos.forEach(p => {
    if (!grupos[p.categoria]) grupos[p.categoria] = [];
    grupos[p.categoria].push(p);
  });

  container.innerHTML = Object.entries(grupos).map(([cat, items]) => `
    <div class="section-title">${cat}</div>
    <div class="grid">
      ${items.map((p, i) => `
        <div class="card" style="animation-delay:${i*0.05}s" onclick="openDetail('${p.id}')">
          <div class="card-img">
            ${p.imagen
              ? `<img src="${p.imagen}" alt="${p.nombre}" loading="lazy">`
              : '🍽️'}
          </div>
          <div class="card-body">
            <div class="card-name">${p.nombre}</div>
            <div class="card-desc">${p.descripcion || ''}</div>
            <div class="card-footer">
              <span class="price">$${Number(p.precio).toFixed(2)}</span>
              <button class="add-btn" onclick="event.stopPropagation();agregarAlCarrito('${p.id}')">+</button>
            </div>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

document.getElementById('search').addEventListener('input', e => {
  filtro = e.target.value;
  renderMenu();
});

// ── Detalle ───────────────────────────────────────────────
function openDetail(id) {
  const p = productos.find(x => x.id === id);
  if (!p) return;
  document.getElementById('detail-card').innerHTML = `
    <div class="detail-img">
      ${p.imagen ? `<img src="${p.imagen}" alt="${p.nombre}">` : '🍽️'}
    </div>
    <div class="detail-body">
      <div class="detail-cat">${p.categoria}</div>
      <div class="detail-name">${p.nombre}</div>
      <div class="detail-desc">${p.descripcion || 'Sin descripción.'}</div>
      <div class="detail-price">$${Number(p.precio).toFixed(2)}</div>
      <div class="detail-actions">
        <button class="detail-add" onclick="agregarAlCarrito('${p.id}');closeDetail()">
          + Agregar a mi orden
        </button>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
    </div>`;
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
}
function closeDetailOutside(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetail();
}

// ── Carrito ───────────────────────────────────────────────
function agregarAlCarrito(id) {
  const p = productos.find(x => x.id === id);
  if (!p) return;
  const item = carrito.find(c => c.id === id);
  if (item) item.qty++;
  else carrito.push({ ...p, qty: 1 });
  actualizarFAB();
  // mini feedback
  const fab = document.getElementById('cart-fab');
  fab.style.transform = 'scale(1.15)';
  setTimeout(() => fab.style.transform = '', 200);
}

function actualizarFAB() {
  const total = carrito.reduce((s, c) => s + c.qty, 0);
  document.getElementById('cart-count').textContent = total;
  document.getElementById('cart-fab').classList.toggle('visible', total > 0);
}

function openCart() {
  renderCarrito();
  document.getElementById('cart-overlay').classList.add('open');
}
function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
}
function closeCartOutside(e) {
  if (e.target === document.getElementById('cart-overlay')) closeCart();
}

function cambiarQty(id, delta) {
  const item = carrito.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) carrito = carrito.filter(c => c.id !== id);
  actualizarFAB();
  renderCarrito();
}

function renderCarrito() {
  const wrap = document.getElementById('cart-items');
  const totalWrap = document.getElementById('cart-total-wrap');

  if (!carrito.length) {
    wrap.innerHTML = '<div class="cart-empty">Tu orden está vacía 🍽️</div>';
    totalWrap.innerHTML = '';
    return;
  }

  wrap.innerHTML = carrito.map(item => `
    <div class="cart-item">
      <div class="ci-img">
        ${item.imagen ? `<img src="${item.imagen}" alt="${item.nombre}">` : '🍽️'}
      </div>
      <div class="ci-info">
        <div class="ci-name">${item.nombre}</div>
        <div class="ci-price">$${(item.precio * item.qty).toFixed(2)}</div>
      </div>
      <div class="ci-qty">
        <button class="qty-btn" onclick="cambiarQty('${item.id}',-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="cambiarQty('${item.id}',1)">+</button>
      </div>
    </div>`).join('');

  const total = carrito.reduce((s, c) => s + c.precio * c.qty, 0);

  totalWrap.innerHTML = `
    <div class="cart-total">
      <span>Total</span>
      <span>$${total.toFixed(2)}</span>
    </div>
    <button class="wa-btn" onclick="enviarWhatsApp()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15

function enviarWhatsApp() {
  if (!carrito.length) return;
  const lines = carrito.map(c =>
    `• ${c.nombre} x${c.qty} — $${(c.precio * c.qty).toFixed(2)}`
  ).join('\n');
  const total = carrito.reduce((s, c) => s + c.precio * c.qty, 0);
  const msg = `🍽️ *Mi Pedido:*\n\n${lines}\n\n*Total: $${total.toFixed(2)}*`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ── PWA: desregistrar SW para siempre usar internet ─────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
}

// ── Init ──────────────────────────────────────────────────
cargarProductos();
